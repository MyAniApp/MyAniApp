query Thread($id: Int, $page: Int) {
    thread: Thread(id: $id) {
        ...ThreadFragment
        id
        title
        body
        userId
        replyCount
        viewCount
        isLocked
        isSticky
        isSubscribed
        isLiked
        likeCount
        repliedAt
        createdAt
        siteUrl
    }
    comments: Page(page: $page, perPage: 30) {
        pageInfo {
            ...PageInfo
            total
            lastPage
        }
        threadComments(threadId: $id) {
            id
            threadId
            comment
            isLiked
            likeCount
            createdAt
            user {
                # using "UserFragment" here breaks "childComments"...
                id
                name
                donatorTier
                donatorBadge
                moderatorRoles
                avatar {
                    large
                }
            }
            childComments
            isLocked
        }
    }
}

mutation SaveComment(
    $id: Int
    $threadId: Int
    $parentCommentId: Int
    $comment: String
) {
    SaveThreadComment(
        id: $id
        threadId: $threadId
        parentCommentId: $parentCommentId
        comment: $comment
    ) {
        id
        threadId
        comment
        isLiked
        likeCount
        createdAt
        user {
            id
            name
            donatorTier
            donatorBadge
            moderatorRoles
            avatar {
                large
            }
        }
        childComments
        isLocked
    }
}

mutation DeleteComment($id: Int) {
    DeleteThreadComment(id: $id) {
        deleted
    }
}

mutation ToggleThreadSubscription($id: Int, $subscribe: Boolean) {
    ToggleThreadSubscription(threadId: $id, subscribe: $subscribe) {
        id
        isSubscribed
    }
}

mutation SaveThread(
    $id: Int
    $title: String
    $body: String
    $categories: [Int]
    $media: [Int]
) {
    SaveThread(
        id: $id
        title: $title
        body: $body
        categories: $categories
        mediaCategories: $media
    ) {
        ...ThreadFragment
    }
}

mutation DeleteThread($id: Int) {
    DeleteThread(id: $id) {
        deleted
    }
}
