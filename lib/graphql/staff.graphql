query Staff($id: Int, $onList: Boolean, $characterPage: Int, $staffPage: Int, $sort: [MediaSort]) {
    Staff(id: $id) {
        ...StaffFragment
        description
        gender
        language: languageV2
        dateOfBirth {
            ...FuzzyDate
        }
        dateOfDeath {
            ...FuzzyDate
        }
        age
        yearsActive
        homeTown
        bloodType
        favourites
        isFavourite
        isFavouriteBlocked
        characterMedia(
            page: $characterPage
            onList: $onList
            sort: $sort
        ) {
            pageInfo {
                ...PageInfo
            }
            edges {
                node {
                    ...MediaFragment
                    startDate {
                        year
                    }
                }
                characters {
                    ...CharacterFragment
                }
            }
        }
        staffMedia(page: $staffPage, onList: $onList, sort: $sort) {
            pageInfo {
                ...PageInfo
            }
            edges {
                node {
                    ...MediaFragment
                }
                staffRole
            }
        }
    }
}
